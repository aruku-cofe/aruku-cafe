<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aruku Cafe | منوی دیجیتال</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --brown:#7c4a30;
    --brown-dark:#5c3620;
    --cream:#f8e2ba;
    --cream-light:#fdf1de;
    --green:#1f2e22;
    --green-dark:#182319;
    --orange:#eaa661;
    --ink:#2c1c10;
    --ink-soft:#5a4534;
    --line:rgba(0,0,0,.08);
    --ph:#d9d3c8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Vazirmatn',sans-serif;
    background:var(--cream-light);
    color:var(--ink);
    overflow-x:hidden;
  }
  button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;}
  img,svg{display:block;}
  .hidden{display:none !important;}

  /* ================= HOME ================= */
  .hero{
    position:relative;
  }
  .hero-photo{
    width:100%;
    height:clamp(160px, 26vw, 300px);
    background:#cfc7b8;
  }

  .brandmark{
    width:126px;
    margin:-46px auto 0;
    position:relative;
    z-index:5;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.18));
  }

  .welcome{
    text-align:center;
    padding:14px 24px 6px;
    color:var(--ink-soft);
    font-size:13.5px;
    line-height:2;
  }

  .contact-btn-wrap{
    display:flex; justify-content:center;
    padding:6px 20px 22px;
  }
  .contact-btn{
    background:var(--brown);
    color:#fff;
    font-size:13.5px;
    font-weight:600;
    padding:11px 26px;
    border-radius:999px;
  }

  /* quick menu domes */
  .quick-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    padding:22px 16px 6px;
  }
  @media (max-width:420px){
    .quick-grid{ grid-template-columns:repeat(2,1fr); }
  }
  .dome{
    display:flex; flex-direction:column;
    border-radius:44px 44px 12px 12px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .dome .top{
    background:var(--cream);
    padding:20px 8px 14px;
    display:flex;align-items:center;justify-content:center;
  }
  .dome .top svg{ width:34px;height:34px; stroke:var(--ink); }
  .dome .bottom{
    background:#fff;
    text-align:center;
    padding:10px 6px 14px;
    font-size:12.5px;
    font-weight:700;
    line-height:1.6;
  }

  /* ================= TOP TAB BAR (browse view) ================= */
  .topbar{
    position:sticky; top:0; z-index:60;
    background:var(--brown);
  }
  .backrow{
    display:flex; align-items:center; gap:10px;
    padding:12px 14px 0;
  }
  .backbtn{
    color:#fff; font-size:13px; display:flex; align-items:center; gap:6px;
    opacity:.9;
  }
  .backbtn svg{ width:16px;height:16px; }
  .tabs{
    display:flex;
    overflow-x:auto;
    scrollbar-width:none;
    padding:12px 10px;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    padding:14px 20px;
    font-size:14px;
    font-weight:600;
    color:#f3e6d3;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--cream);
    color:var(--brown-dark);
    border-radius:8px;
  }

  .cat-heading{
    padding:22px 18px 4px;
    text-align:center;
  }
  .cat-heading h2{
    font-size:26px; font-weight:800; color:var(--brown-dark);
  }

  /* ================= ITEM CARDS ================= */
  .item-list{
    display:flex; flex-direction:column;
    gap:22px;
    padding:18px 16px 30px;
    max-width:640px;
    margin:0 auto;
  }
  .item-card{
    border-radius:18px;
    overflow:hidden;
    border:1px solid var(--line);
    background:#fff;
  }
  .item-photo{
    width:100%;
    aspect-ratio:4/3;
    background:
      repeating-linear-gradient(45deg, #ded6c4 0 14px, #cabfa8 14px 28px);
    border-bottom:1px dashed #9a8b6d;
    display:flex;align-items:center;justify-content:center;
    color:#6b5c42;
    font-size:12.5px;
    font-weight:600;
    gap:7px;
    flex-direction:column;
  }
  .item-photo svg{ width:36px;height:36px; opacity:.85; stroke:#6b5c42; }
  .item-panel{
    background:var(--cream);
    padding:16px 18px 18px;
  }
  .item-top{
    display:flex; justify-content:space-between; align-items:baseline; gap:10px;
  }
  .item-top h3{
    font-size:16.5px; font-weight:700; color:var(--ink);
  }
  .item-price{
    font-size:14.5px; font-weight:700; color:var(--brown-dark); white-space:nowrap;
  }
  .item-price::after{ content:" تومان"; font-size:11.5px; font-weight:500; color:var(--ink-soft); }
  .item-desc{
    margin-top:8px;
    font-size:12.8px;
    color:var(--ink-soft);
    line-height:1.9;
  }

  /* ================= CONTACT VIEW ================= */
  .contact-page{
    min-height:100vh;
    padding:24px 22px 40px;
  }
  .contact-back{
    display:inline-flex; align-items:center; gap:6px;
    color:var(--brown-dark);
    font-size:13.5px;
    font-weight:600;
    margin-bottom:26px;
  }
  .contact-back svg{ width:16px;height:16px; }
  .contact-logo{
    width:96px; margin:0 auto 20px;
  }
  .contact-page h2{
    text-align:center;
    font-size:22px;
    font-weight:800;
    color:var(--brown-dark);
    margin-bottom:30px;
  }
  .contact-row{
    background:var(--cream);
    border-radius:16px;
    padding:16px 18px;
    margin-bottom:14px;
    display:flex; align-items:flex-start; gap:12px;
  }
  .contact-row svg{ width:22px;height:22px; flex:0 0 auto; stroke:var(--brown-dark); margin-top:2px; }
  .contact-row .label{ font-size:12px; color:var(--ink-soft); margin-bottom:4px; }
  .contact-row .value{ font-size:14.5px; font-weight:600; color:var(--ink); line-height:1.9; }
  .contact-row a.value{ color:var(--ink); text-decoration:none; }

</style>
</head>

    tabsEl.appendChild(btn);
  });

  renderCategory(menu.cats[0]);
}

    const card = document.createElement('div');
